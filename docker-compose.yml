version: '3.9'

# ── Startup order ──────────────────────────────────────────────────
#  Tier 1 (parallel): redis, db, minio
#  Tier 2:            migrate          ← after db healthy (runs once)
#  Tier 3 (parallel): api, worker     ← after migrate completes
#  Tier 4:            web             ← after api healthy
#  Tier 5:            nginx           ← after web + api healthy
#
#  Env vars: copy .env.example to .env and fill in your values.
#  Docker Compose reads .env automatically for ${VAR} substitution,
#  and each service loads it via env_file for container-level access.
# ───────────────────────────────────────────────────────────────────

networks:
  docsense_net:
    driver: bridge

services:

  # ── Infrastructure ───────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: docsense_redis
    restart: unless-stopped
    networks:
      - docsense_net
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 192mb
      --maxmemory-policy noeviction
      --tcp-keepalive 60
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  db:
    image: pgvector/pgvector:pg16
    container_name: docsense_db
    restart: unless-stopped
    networks:
      - docsense_net
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-docsense}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-docsense123}
      POSTGRES_DB: ${DB_NAME:-docsense}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-docsense}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  minio:
    image: minio/minio:latest
    container_name: docsense_minio
    restart: unless-stopped
    networks:
      - docsense_net
    ports:
      - "127.0.0.1:9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ── Migration (runs once, exits) ─────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: docsense_migrate
    restart: "no"
    networks:
      - docsense_net
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the Docker-internal db host
      DATABASE_URL: postgresql://${DB_USER:-docsense}:${DB_PASSWORD:-docsense123}@db:5432/${DB_NAME:-docsense}
    depends_on:
      db:
        condition: service_healthy

  # ── Application (starts after migration completes) ───────────────

  # api:
