version: '3.9'

services:
  minio:
    image: minio/minio:latest
    container_name: docsense_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: docsense_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      WEB_HOST: web
      API_HOST: api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

  db:
    image: pgvector/pgvector:pg16
    container_name: docsense_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: docsense
      POSTGRES_PASSWORD: docsense123
      POSTGRES_DB: docsense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docsense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: docsense_api
    restart: unless-stopped
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost
      DATABASE_URL: postgresql://docsense:docsense123@db:5432/docsense
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-me-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      INTERNAL_SECRET: change-me-in-production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: docs
      MINIO_USE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: docsense_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://docsense:docsense123@db:5432/docsense
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: docs
      MINIO_USE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: docsense_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      API_URL: http://api:3001
      NEXTAUTH_URL: http://localhost
      NEXTAUTH_SECRET: change-me-in-production
      INTERNAL_SECRET: change-me-in-production
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata: