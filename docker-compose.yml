version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docsense_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: docsense
      POSTGRES_PASSWORD: docsense123
      POSTGRES_DB: docsense

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docsense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata: