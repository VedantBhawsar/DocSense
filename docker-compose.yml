version: '3.9'

# ── Application services ─────────────────────────────────────────
# Prereq: infra must already be running. From the project root:
#
#   1. Start infra (in a separate terminal or detached):
#        cd infra && docker compose --env-file ../.env up -d
#
#   2. Then start the app from this directory:
#        docker compose up -d
#
# Startup order (app side):
#  Tier 1: migrate           ← runs once, exits (requires db reachable)
#  Tier 2 (parallel): api, worker   ← after migrate completes
#  Tier 3: web              ← after api healthy
#  Tier 4: nginx            ← after web + api healthy
#
# NOTE on depends_on across compose files:
#   Docker Compose cannot express "wait for a service in another file".
#   The infra services (db, redis, minio) are referenced here only by
#   network DNS — they must already be up. If migrate races ahead and
#   the db isn't accepting connections yet, just re-run it; the
#   migration tool is idempotent.
#
# Env vars: copy .env.example to .env and fill in your values.
# Docker Compose reads .env automatically for ${VAR} substitution,
# and each service loads it via env_file for container-level access.
# ───────────────────────────────────────────────────────────────────

networks:
  docsense_infra:
    name: docsense_infra
    external: true

services:

  # ── Migration (runs once, exits) ─────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: docsense_migrate
    restart: "no"
    networks:
      - docsense_infra
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the Docker-internal db host
      DATABASE_URL: postgresql://${DB_USER:-docsense}:${DB_PASSWORD:-docsense123}@db:5432/${DB_NAME:-docsense}

